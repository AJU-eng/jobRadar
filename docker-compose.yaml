version: '3.8'

services:
  db:
    image: postgres:16.3
    container_name: postgres-athmathon
    environment:
      POSTGRES_DB: athma_thon
      POSTGRES_USER: athma
      POSTGRES_PASSWORD: athma123456
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"


volumes:
  db-data:
